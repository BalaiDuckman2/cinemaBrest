name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reeltime-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: reeltime-v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: reeltime-v2/.turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('reeltime-v2/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm turbo run lint

      - name: Build
        run: pnpm turbo run build

      - name: Test
        run: pnpm turbo run test

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        run: |
          docker build -f reeltime-v2/apps/api/Dockerfile \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api:${{ steps.meta.outputs.sha_short }} \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api:latest \
            reeltime-v2
          docker push ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api --all-tags

      - name: Build and push Web image
        run: |
          docker build -f reeltime-v2/apps/web/Dockerfile \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web:${{ steps.meta.outputs.sha_short }} \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web:latest \
            reeltime-v2
          docker push ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web --all-tags

      - name: Trigger Portainer webhook
        if: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" || true
