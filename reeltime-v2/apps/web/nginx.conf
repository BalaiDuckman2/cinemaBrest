server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests to the api service
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy healthcheck
    location /healthcheck {
        proxy_pass http://api:3000;
    }

    # Proxy metrics
    location /metrics {
        proxy_pass http://api:3000;
    }

    # Service worker must always be revalidated, otherwise the immutable
    # rule below would freeze it for a year and break PWA auto-update.
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    # PWA manifest: revalidate so metadata changes propagate
    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-cache" always;
    }

    # SPA routing: all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache with immutable (filenames are content-hashed)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
