## ReelTime v2 - Production Stack (Portainer)
##
## Utilisation dans Portainer :
## 1. Stacks > Add stack > Web editor
## 2. Coller ce fichier
## 3. Ajouter les variables d'environnement (voir ci-dessous)
## 4. Deploy the stack
##
## Variables optionnelles :
##   CORS_ORIGIN         - Origines autorisees (defaut: *)
##   LOG_LEVEL           - trace|debug|info|warn|error (defaut: info)
##   PORT                - Port expose (defaut: 5000)

services:
  api:
    image: ghcr.io/balaiduckman2/cinemabrest/reeltime-api:latest
    container_name: reeltime-api
    user: "0:0"
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/reeltime.db
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: production
      SKIP_PRELOAD: "false"
      TIMEZONE: Europe/Paris
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TMDB_API_KEY: 7c2e5d83bc7e846ac7ea6256e969f1d9
    volumes:
      - reeltime_data6:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/balaiduckman2/cinemabrest/reeltime-web:latest
    container_name: reeltime-web
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  reeltime_data6:
