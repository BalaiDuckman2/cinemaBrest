name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api:${{ steps.meta.outputs.sha_short }} \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api:latest .
          docker push ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api --all-tags

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web:${{ steps.meta.outputs.sha_short }} \
            -t ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web:latest .
          docker push ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web --all-tags

      - name: Create production docker-compose on NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_SSH_HOST }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.NAS_DEPLOY_PATH }}
            cat > ${{ secrets.NAS_DEPLOY_PATH }}/docker-compose.yml << 'COMPOSE'
            services:
              api:
                image: ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-api:latest
                restart: unless-stopped
                environment:
                  DATABASE_URL: file:/app/data/reeltime.db
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
                  CORS_ORIGIN: "*"
                  NODE_ENV: production
                  SKIP_PRELOAD: "false"
                  TIMEZONE: Europe/Paris
                  LOG_LEVEL: info
                volumes:
                  - reeltime_data:/app/data

              web:
                image: ghcr.io/${{ steps.meta.outputs.repo_lower }}/reeltime-web:latest
                restart: unless-stopped
                depends_on:
                  api:
                    condition: service_healthy
                ports:
                  - "80:80"

            volumes:
              reeltime_data:
            COMPOSE

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_SSH_HOST }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: |
            cd ${{ secrets.NAS_DEPLOY_PATH }}
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose pull
            docker compose up -d
            docker image prune -f
